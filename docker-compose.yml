version: '3.8'

services:
  postgres:

    image: postgres:13-alpine


    container_name: postgres_db
    restart: unless-stopped

    environment:

      POSTGRES_DB: appdb           # Имя базы данных
      POSTGRES_USER: appuser       # Имя пользователя
      POSTGRES_PASSWORD: secretpass # Пароль

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data


    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U appuser -d appdb" ]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - app_network

volumes:
  postgres_data:
    name: postgres_data_volume

networks:
  app_network:
    driver: bridge